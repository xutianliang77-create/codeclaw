<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeClaw</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <!-- highlight.js 主题：浅色 / 深色根据 prefers-color-scheme 自动切换 -->
  <link rel="stylesheet" href="/static/vendor/highlight-light.min.css"
        media="(prefers-color-scheme: light)" />
  <link rel="stylesheet" href="/static/vendor/highlight-dark.min.css"
        media="(prefers-color-scheme: dark)" />
</head>
<body>
  <header>
    <h1>CodeClaw <span class="version">web</span></h1>
    <div id="cost" class="cost hidden" title="LLM 调用成本（本会话 / 今日跨会话）"></div>
    <button id="settings-btn" class="settings-btn hidden" title="Provider 配置 / 设置">⚙</button>
    <div id="status" class="status disconnected">未连接</div>
  </header>

  <aside id="settings-panel" class="settings-panel hidden" aria-hidden="true">
    <div class="settings-header">
      <h2>设置</h2>
      <button id="settings-close" class="icon-btn" aria-label="关闭">×</button>
    </div>
    <div id="settings-body" class="settings-body">
      <p class="muted">加载中...</p>
    </div>
  </aside>

  <section id="auth-bar" class="auth-bar">
    <input id="token-input" type="password" placeholder="CODECLAW_WEB_TOKEN" autocomplete="off" />
    <button id="connect-btn">连接</button>
    <button id="logout-btn" class="hidden">登出</button>
  </section>

  <main id="chat" class="chat hidden">
    <div id="messages" class="messages" aria-live="polite"></div>
    <form id="composer" class="composer">
      <textarea id="input" placeholder="输入消息（Enter 发送 · Shift+Enter 换行）" rows="2"></textarea>
      <button id="send-btn" type="submit">发送</button>
    </form>
  </main>

  <footer>
    <span>本地 only · token 仅存浏览器 localStorage · 后端 SSE 推流</span>
  </footer>

  <!-- 第三方依赖：本地拷贝离线可用（vendor/）。defer 保证 DOMContentLoaded 后执行 -->
  <script src="/static/vendor/marked.min.js" defer></script>
  <script src="/static/vendor/purify.min.js" defer></script>
  <script src="/static/vendor/highlight.min.js" defer></script>
  <script src="/static/app.js" defer></script>
</body>
</html>
